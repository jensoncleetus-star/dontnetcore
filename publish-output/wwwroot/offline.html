<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — BOS</title>
    <meta name="theme-color" content="#6366f1">
    <style>
        :root { --brand-1:#6366f1; --brand-2:#8b5cf6; --brand-3:#3b82f6; }
        * { box-sizing:border-box; margin:0; padding:0; }
        html, body { height:100%; }
        body {
            font-family:'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif;
            background:#070b1a; color:#e2e8f0;
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            text-align:center; padding:24px;
        }
        .card {
            max-width:420px; width:100%;
            background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.10);
            border-radius:20px; padding:40px 28px; backdrop-filter:blur(8px);
        }
        .logo {
            width:72px; height:72px; margin:0 auto 22px; border-radius:18px;
            background:linear-gradient(135deg, var(--brand-1), var(--brand-2));
            display:flex; align-items:center; justify-content:center;
            font-size:24px; font-weight:800; letter-spacing:-1px; color:#fff;
            box-shadow:0 10px 30px rgba(99,102,241,.45);
        }
        h1 { font-size:22px; margin-bottom:10px; color:#fff; }
        p { color:#94a3b8; font-size:15px; line-height:1.55; margin-bottom:24px; }
        button {
            border:0; cursor:pointer; color:#fff; font-size:15px; font-weight:600;
            padding:12px 26px; border-radius:12px; min-height:44px;
            background:linear-gradient(135deg, var(--brand-1), var(--brand-3));
            box-shadow:0 8px 22px rgba(59,130,246,.40);
        }
        button:active { transform:translateY(1px); }
        .hint { margin-top:18px; font-size:12.5px; color:#64748b; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">BOS</div>
        <h1>You're offline</h1>
        <p>BOS needs an internet connection to load live data. Please check your network and try again.</p>
        <button onclick="location.reload()">Retry</button>
        <div class="hint">Your work is safe — nothing was lost.</div>
    </div>
    <script>
        // Auto-retry the moment the connection returns.
        window.addEventListener('online', function () { location.reload(); });
    </script>
</body>
</html>
